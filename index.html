<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Homelab Builder Game</title>
    <meta name="description" content="Build your dream homelab server! Shop for parts, install software, maximize score.">
    <style>
        /* [EXACT SAME CSS FROM PREVIOUS - COPIED HERE FOR SINGLE FILE] */
        * { box-sizing: border-box; }
        body { background: linear-gradient(135deg, #000, #001100); color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 15px; min-height: 100vh; }
        h1 { text-align: center; color: #0ff; text-shadow: 0 0 10px #0ff; margin-bottom: 20px; }
        #game-container { max-width: 1200px; margin: 0 auto; }
        #terminal { height: 35vh; overflow-y: auto; padding: 15px; border: 2px solid #0f0; margin-bottom: 15px; background: #000; white-space: pre-wrap; border-radius: 5px; box-shadow: inset 0 0 20px #000; }
        #input-line { display: flex; gap: 10px; margin-bottom: 15px; }
        #prompt { color: #0f0; font-weight: bold; padding: 10px; background: #111; border-radius: 3px; }
        #user-input { flex: 1; background: #111; border: 1px solid #0f0; color: #0f0; font-family: inherit; padding: 10px; outline: none; border-radius: 3px; }
        #shop { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px #0f0; }
        #shop h3 { color: #0ff; text-align: center; margin: 0 0 15px 0; text-shadow: 0 0 5px #0ff; }
        #shop-search { width: 100%; background: #000; color: #0f0; border: 2px solid #0f0; padding: 12px; margin-bottom: 15px; font-family: inherit; border-radius: 5px; font-size: 16px; }
        .shop-item { background: #222; margin: 12px 0; padding: 15px; border: 1px solid #444; border-radius: 8px; display: block !important; transition: all 0.3s; }
        .shop-item:hover { box-shadow: 0 0 15px #0f0; }
        .stock-in { color: #0f0; }
        .stock-low { color: #ff0; }
        .stock-out { color: #f00; }
        .shop-item button { float: right; background: linear-gradient(#0f0, #00d000); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 14px; }
        .shop-item button:hover:not(:disabled) { background: linear-gradient(#0ff, #0f0); transform: scale(1.05); }
        .shop-item button:disabled { background: #444; color: #666; cursor: not-allowed; }
        #status-bar { background: linear-gradient(#000, #111); color: #ff0; font-weight: bold; padding: 15px; border: 2px solid #ff0; margin-bottom: 15px; border-radius: 8px; text-align: center; box-shadow: 0 0 20px #ff0; }
        .win { animation: pulse 1s infinite; color: #0ff !important; text-shadow: 0 0 20px #0ff; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @media (max-width: 768px) { #terminal { height: 30vh; } #shop { height: 50vh; } }
    </style>
</head>
