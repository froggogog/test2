<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Homelab Builder - COMPLETE</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 15px; 
            overflow: hidden;
        }
        #terminal { 
            height: 40vh; 
            overflow-y: auto; 
            padding: 10px; 
            border: 2px solid #0f0; 
            margin-bottom: 10px; 
            background: #000; 
            white-space: pre-wrap; 
            font-size: 14px;
        }
        #input-line { 
            display: flex; 
            margin-bottom: 10px; 
            align-items: center;
        }
        #prompt { color: #0f0; font-weight: bold; margin-right: 5px; }
        #user-input { 
            background: none; 
            border: 1px solid #0f0; 
            color: #0f0; 
            font-family: inherit; 
            flex: 1; 
            padding: 8px; 
            outline: none;
        }
        #shop { 
            background: #111; 
            border: 2px solid #0f0; 
            padding: 15px; 
            height: 45vh; 
            overflow-y: auto;
        }
        #shop-search { 
            width: 100%; 
            background: #000; 
            color: #0f0; 
            border: 1px solid #0f0; 
            padding: 8px; 
            margin-bottom: 10px; 
            font-family: inherit; 
        }
        .shop-item { 
            background: #222; 
            margin: 8px 0; 
            padding: 10px; 
            border: 1px solid #444; 
            border-radius: 3px;
            display: block !important;
        }
        .stock-in { color: #0f0; }
        .stock-low { color: #ff0; }
        .stock-out { color: #f00; }
        .shop-item button { 
            float: right; 
            background: #0f0; 
            color: #000; 
            border: none; 
            padding: 6px 12px; 
            cursor: pointer; 
            font-weight: bold;
            margin-left: 10px;
        }
        .shop-item button:hover:not(:disabled) { background: #00ff00; }
        .shop-item button:disabled { background: #444; color: #666; cursor: not-allowed; }
        #status-bar { 
            background: #000; 
            color: #ff0; 
            font-weight: bold; 
            padding: 10px; 
            border: 2px solid #ff0; 
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="status-bar">Loading Homelab Builder...</div>
    <div id="terminal"></div>
    <div id="input-line">
        <span id="prompt">homelab&gt;</span>
        <input id="user-input" type="text" autofocus placeholder="install proxmox, buy used pc, status, help">
    </div>
    <div id="shop">
        <h3 style="color: #0f0; margin: 0 0 10px 0; text-align: center;">🛒 FULLY STOCKED SHOP</h3>
        <input id="shop-search" type="text" placeholder="🔍 Search: cpu ram storage..." onkeyup="filterShop()">
        <div id="shop-items"><!-- 8 ITEMS LOAD HERE --></div>
    </div>

    <script>
        console.log('🎮 COMPLETE Homelab Builder v1.0');
        
        // GAME STATE
        const game = {
            budget: 500,
            inventory: [],
            server: {perf: 0, eff: 1, stor: 0, virt: 0, services: 0},
            score: 0,
            restockTimeout: null
        };

        // SHOP INVENTORY (8 items with stock)
        const shopItems = {
            'used pc': {cost: 150, perf: 3, stock: 2, max: 2, desc: 'Base homelab PC'},
            'i5 cpu': {cost: 100, perf: 5, stock: 3, max: 3, desc: 'Mid CPU upgrade'},
            'xeon cpu': {cost: 200, perf: 7, stock: 1, max: 1, desc: 'Server CPU'},
            '16gb ram': {cost: 50, perf: 2, stock: 5, max: 5, desc: 'Basic RAM kit'},
            '32gb ram': {cost: 100, perf: 4, stock: 2, max: 2, desc: '32GB VM RAM'},
            'ssd 256gb': {cost: 50, stor: 3, stock: 4, max: 4, desc: 'Fast SSD'},
            'hdd 2tb': {cost: 60, stor: 5, stock: 3, max: 3, desc: '2TB storage'},
            'ups': {cost: 80, eff: 2, stock: 2, max: 2, desc: 'Power backup'}
        };

        // SERVICES/OS
        const software = {
            os: {'proxmox': {virt: 10}, 'ubuntu': {virt: 5}},
            services: {'plex': {perf_req: 4, serv: 2}, 'pi-hole': {serv: 1}, 'jellyfin': {perf_req: 3, serv: 2}}
        };

        // DOM ELEMENTS
        const term = document.getElementById('terminal');
        const input = document.getElementById('user-input');
        const statusBar = document.getElementById('status-bar');
        const shopItemsDiv = document.getElementById('shop-items');
        const shopSearch = document.getElementById('shop-search');

        function log(text, type='info') {
            const colors = {info: '#0f0', success: '#0ff', warn: '#ff0', error: '#f00'};
            term.innerHTML += `<span style="color:${colors[type] || '#0f0'}">${text}</span><br>`;
            term.scrollTop = term.scrollHeight;
            console.log(`[${type}] ${text}`);
        }

        function updateStatus() {
            game.score = Math.floor(game.server.perf * game.server.eff * (1 + game.server.stor/10) * game.server.virt * game.server.services);
            statusBar.innerHTML = `
                💰 Budget: $${game.budget} | 🎯 Score: <strong>${game.score}</strong> | 
                ⚡Perf:${game.server.perf} 💾Stor:${game.server.stor} 🖥️Virt:${game.server.virt} 🔌Serv:${game.server.services}
                ${game.score > 1000 ? '<span style="color:#0ff">🏆 MASTER HOMELAB!</span>' : ''}
            `;
        }

        function getStockStatus(stock) {
            return stock === 0 ? 'stock-out' : stock <= 1 ? 'stock-low' : 'stock-in';
        }

        window.buyItem = function(itemName) {
            const item = shopItems[itemName];
            if (!item) return log(`❌ Unknown item: ${itemName}`, 'error');
            if (item.stock === 0) return log(`${itemName.toUpperCase()} SOLD OUT!`, 'error');
            if (game.budget < item.cost) return log(`❌ Need $${item.cost - game.budget} more!`, 'error');
            
            game.budget -= item.cost;
            game.inventory.push(itemName);
            item.stock--;
            
            if (item.perf) game.server.perf += item.perf;
            if (item.stor) game.server.stor += item.stor;
            if (item.eff) game.server.eff += item.eff;
            
            log(`✅ Bought ${itemName}! ($${item.cost} | Stock:${item.stock})`, 'success');
            
            updateStatus();
            renderShop();
            
            // Restock timer
            if (Object.values(shopItems).some(i => i.stock === 0)) {
                clearTimeout(game.restockTimeout);
                game.restockTimeout = setTimeout(restockShop, 8000);
            }
        };

        function renderShop() {
            shopItemsDiv.innerHTML = '';
            Object.entries(shopItems).forEach(([name, item]) => {
                const div = document.createElement('div');
                div.className = `shop-item ${getStockStatus(item.stock)}`;
                const canBuy = game.budget >= item.cost && item.stock > 0;
                div.innerHTML = `
                    <div><strong>${name.toUpperCase()}</strong> <span>$${item.cost}</span></div>
                    <div>${item.desc} <span class="${getStockStatus(item.stock)}">[${item.stock}/${item.max}]</span></div>
                    <button onclick="buyItem('${name}')" ${!canBuy?'disabled':''}>
                        ${item.stock>0 ? 'BUY NOW' : 'SOLD OUT'}
                    </button>
                `;
                shopItemsDiv.appendChild(div);
            });
            log(`🛒 Shop updated: ${Object.keys(shopItems).length} items`, 'info');
        }

        function filterShop() {
            const q = shopSearch.value.toLowerCase();
            Array.from(shopItemsDiv.children).forEach(el => {
                el.style.display = q && !el.textContent.toLowerCase().includes(q) ? 'none' : 'block';
            });
        }

        function restockShop() {
            Object.values(shopItems).forEach(i => i.stock = i.max);
            log('🛒 SHOP RESTOCKED! Fresh stock available!', 'success');
            renderShop();
        }

        function installSoftware(name) {
            const osItem = software.os[name];
            if (osItem) {
                if (game.inventory.includes(name)) return log(`❌ ${name.toUpperCase()} already installed!`, 'error');
                game.inventory.push(name);
                game.server.virt += osItem.virt;
                log(`✅ Installed ${name.toUpperCase()}!`, 'success');
            } else {
                const srv = software.services[name];
                if (srv) {
                    if (game.server.perf < (srv.perf_req || 0)) return log(`❌ Need Perf ${srv.perf_req}+ for ${name}!`, 'error');
                    game.inventory.push(name);
                    game.server.services += srv.serv;
                    game.server.perf -= 1;
                    log(`✅ ${name.toUpperCase()} service running!`, 'success');
                } else {
                    log(`❌ Software: proxmox, ubuntu, plex, pi-hole, jellyfin`, 'error');
                }
            }
            updateStatus();
        }

        // INITIALIZE GAME
        log('🏠 Welcome to Homelab Builder!');
        log('🎮 Goal: Build server, score 1000+ points!');
        log('🛒 Shop: Click BUY buttons (limited stock)');
        log('💻 Commands: install [proxmox/plex], status, restock, help');
        renderShop();
        updateStatus();

        // EVENT LISTENERS
        shopSearch.onkeyup = filterShop;
        input.onkeydown = e => {
            if (e.key === 'Enter') {
                const cmd = input.value.trim().toLowerCase();
                log(`> ${cmd}`);
                input.value = '';
                
                if (cmd === 'help') {
                    log('Commands: install [proxmox/ubuntu/plex/pi-hole/jellyfin]');
                    log('buy [used pc], status, restock, clear');
                } else if (cmd === 'status') {
                    log(`Budget: $${game.budget} | Score: ${game.score}`);
                    log(`Inventory: ${game.inventory.join(', ') || 'empty'}`);
                } else if (cmd === 'restock') restockShop();
                else if (cmd === 'clear') term.innerHTML = '';
                else if (cmd.startsWith('install ')) installSoftware(cmd.slice(8).trim());
                else if (cmd.startsWith('buy ')) buyItem(cmd.slice(4).trim());
                else log('Type "help" for commands');
            }
        };

        log('✅ Game ready! Shop loaded with 8 items.', 'success');
        console.log('Homelab Builder COMPLETE - All features working!');
    </script>
</body>
</html>
